<script>
marked.setOptions({ breaks: true });

let messages = [];
let pendingAttachments = [];
let memory = [];
const LS_MESSAGES = 'nest_messages';
const LS_CONFIG   = 'nest_config';
const LS_MEMORY   = 'nest_memory';

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function timeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function calcDays() {
  return Math.max(Math.floor((new Date() - new Date('2026-07-01')) / (1000*60*60*24)), 0);
}
document.getElementById('daysCount').textContent = '陪伴第 ' + calcDays() + ' 天';

/* Toast */
let toastTimer = null;
function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

/* ============================================================
API 配置
============================================================ */
function loadConfig() {
  const cfg = JSON.parse(localStorage.getItem(LS_CONFIG) || '{}');
  document.getElementById('cfgEndpoint').value = cfg.endpoint || '';
  document.getElementById('cfgKey').value      = cfg.key      || '';
  document.getElementById('cfgModel').value    = cfg.model    || '';
}
function saveConfig() {
  const cfg = {
    endpoint: document.getElementById('cfgEndpoint').value.trim().replace(/\/$/,''),
    key:      document.getElementById('cfgKey').value.trim(),
    model:    document.getElementById('cfgModel').value.trim()
  };
  localStorage.setItem(LS_CONFIG, JSON.stringify(cfg));
  showToast('设置已保存 ✓');
}
function getConfig() {
  return JSON.parse(localStorage.getItem(LS_CONFIG) || '{}');
}
document.getElementById('cfgSaveBtn').addEventListener('click', saveConfig);

const eyeBtn = document.getElementById('eyeBtn');
const cfgKey = document.getElementById('cfgKey');
eyeBtn.addEventListener('click', () => {
  const show = cfgKey.type === 'password';
  cfgKey.type = show ? 'text' : 'password';
  eyeBtn.textContent = show ? '🙈' : '👁';
});

const loadModelsBtn  = document.getElementById('loadModelsBtn');
const modelDropdown  = document.getElementById('modelDropdown');
const cfgModelInput  = document.getElementById('cfgModel');

loadModelsBtn.addEventListener('click', async () => {
  const endpoint = document.getElementById('cfgEndpoint').value.trim().replace(/\/$/,'');
  const key      = document.getElementById('cfgKey').value.trim();
  if (!endpoint || !key) { showToast('先填端点和 Key'); return; }

  loadModelsBtn.disabled = true;
  loadModelsBtn.textContent = '加载中…';
  modelDropdown.style.display = 'none';
  modelDropdown.innerHTML = '';

  try {
    const res = await fetch(endpoint + '/models', {
      headers: { 'Authorization': 'Bearer ' + key }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const list = (json.data || json.models || [])
      .map(m => m.id || m)
      .filter(Boolean)
      .sort();

    if (list.length === 0) { showToast('没拿到模型，检查一下端点'); return; }

    showToast('加载了 ' + list.length + ' 个模型 ✓');

    const current = cfgModelInput.value.trim();
    list.forEach(id => {
      const item = document.createElement('div');
      item.className = 'model-option' + (id === current ? ' selected' : '');
      item.textContent = id;
      item.addEventListener('click', () => {
        cfgModelInput.value = id;
        modelDropdown.querySelectorAll('.model-option').forEach(el => el.classList.remove('selected'));
        item.classList.add('selected');
        modelDropdown.style.display = 'none';
      });
      modelDropdown.appendChild(item);
    });
    modelDropdown.style.display = 'block';

  } catch(e) {
    showToast('获取失败：' + e.message, 4000);
  } finally {
    loadModelsBtn.disabled = false;
    loadModelsBtn.textContent = '获取列表';
  }
});

/* ============================================================
持久化：消息
============================================================ */
function persistMessages() {
  localStorage.setItem(LS_MESSAGES, JSON.stringify(messages));
}
function loadMessages() {
  try { const r = localStorage.getItem(LS_MESSAGES); if (r) messages = JSON.parse(r); }
  catch(e) { messages = []; }
}

/* ============================================================
持久化：记忆
============================================================ */
function persistMemory() {
  localStorage.setItem(LS_MEMORY, JSON.stringify(memory));
}
function loadMemory() {
  try { const r = localStorage.getItem(LS_MEMORY); if (r) memory = JSON.parse(r); }
  catch(e) { memory = []; }
}

/* ============================================================
记忆区 UI
============================================================ */
function estimateTokens() {
  const totalChars = memory.reduce((sum, m) => sum + (m.content ? m.content.length : 0), 0);
  return Math.round(totalChars / 4);
}
function renderMemoryList() {
  document.getElementById('memoryStats').textContent =
    `共 ${memory.length} 条 · 约 ${estimateTokens()} tokens`;

  const list = document.getElementById('memoryList');
  list.innerHTML = '';

  if (memory.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'memory-empty';
    empty.textContent = '还没有记忆';
    list.appendChild(empty);
    return;
  }

  memory.forEach(m => {
    const item = document.createElement('div');
    item.className = 'memory-item';

    const textEl = document.createElement('div');
    textEl.className = 'memory-content';
    textEl.textContent = m.content;

    const actions = document.createElement('div');
    actions.className = 'memory-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'mem-btn edit-btn';
    editBtn.textContent = '✎';

    const delBtn = document.createElement('button');
    delBtn.className = 'mem-btn';
    delBtn.textContent = '🗑';

    editBtn.addEventListener('click', () => {
      const ta = document.createElement('textarea');
      ta.className = 'memory-edit-area';
      ta.value = m.content;
      textEl.replaceWith(ta);
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      ta.addEventListener('blur', () => {
        const val = ta.value.trim();
        if (val === '') {
          memory = memory.filter(x => x.id !== m.id);
          persistMemory();
          renderMemoryList();
          return;
        }
        m.content = val;
        persistMemory();
        renderMemoryList();
      });
    });

    delBtn.addEventListener('click', () => {
      memory = memory.filter(x => x.id !== m.id);
      persistMemory();
      renderMemoryList();
    });

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);
    item.appendChild(textEl);
    item.appendChild(actions);
    list.appendChild(item);
  });
}

document.getElementById('memoryAddBtn').addEventListener('click', () => {
  const id = genId();
  memory.push({ id, content:'', time: timeStr() });
  persistMemory();
  renderMemoryList();
  requestAnimationFrame(() => {
    const btn = document.querySelector('.memory-item:last-child .edit-btn');
    if (btn) btn.click();
  });
});

/* ============================================================
[memory_update] 标记解析
============================================================ */
function extractMemoryMarkers(text) {
  const regex = /\[memory_update:\s*(\{[\s\S]*?\})\]/g;
  const actions = [];
  const cleanText = text.replace(regex, (match, jsonStr) => {
    try { actions.push(JSON.parse(jsonStr)); }
    catch(e) { console.warn('memory marker解析失败', e, jsonStr); }
    return '';
  }).trim();
  return { cleanText, actions };
}

// 简单相似度：取两段文本前N个字符做字符重叠比例估算
function similarity(a, b) {
  if (!a || !b) return 0;
  const shortLen = Math.min(a.length, b.length, 30);
  const as = a.slice(0, shortLen), bs = b.slice(0, shortLen);
  let match = 0;
  for (let i = 0; i < shortLen; i++) if (as[i] === bs[i]) match++;
  return match / shortLen;
}

function findBestMatchIndex(action) {
  if (action.id) {
    const idx = memory.findIndex(m => m.id === action.id);
    if (idx !== -1) return idx;
  }
  if (action.target) {
    const idx = memory.findIndex(m => m.content.includes(action.target));
    if (idx !== -1) return idx;
  }
  if (action.content) {
    let bestIdx = -1, bestScore = 0;
    memory.forEach((m, i) => {
      const score = similarity(m.content, action.content);
      if (score > bestScore) { bestScore = score; bestIdx = i; }
    });
    if (bestScore >= 0.4) return bestIdx; // 门槛，避免乱配
  }
  return -1;
}

function applyMemoryUpdate(action) {
  const act = action.action;
  if (act === 'add') {
    memory.push({ id: genId(), content: action.content || '', time: timeStr() });
    return;
  }
  if (act === 'edit') {
    const idx = findBestMatchIndex(action);
    if (idx === -1) {
      showToast('未找到要编辑的记忆');
      return;
    }
    memory[idx].content = action.content || memory[idx].content;
    memory[idx].time = timeStr();
    return;
  }
  if (act === 'delete') {
    const idx = findBestMatchIndex(action);
    if (idx !== -1) memory.splice(idx, 1);
  }
}

function processMemoryMarkers(rawText) {
  const { cleanText, actions } = extractMemoryMarkers(rawText);
  if (actions.length > 0) {
    actions.forEach(a => applyMemoryUpdate(a));
    persistMemory();
    renderMemoryList();
    showToast('记忆已更新 🐾');
  }
  return cleanText;
}

/* ============================================================
渲染：聊天气泡（增量）
============================================================ */
const chatScroll = document.getElementById('chatScroll');

function buildMsgRow(msg, index) {
  const row  = document.createElement('div');
  row.className = 'msg-row ' + (msg.role === 'user' ? 'user' : 'ai');
  row.dataset.index = index;
  const wrap = document.createElement('div');
  wrap.className = 'msg-bubble-wrap';

  if (msg.images && msg.images.length > 0) {
    const imgWrap = document.createElement('div');
    imgWrap.className = 'msg-images';
    msg.images.forEach(src => { const img = document.createElement('img'); img.src = src; imgWrap.appendChild(img); });
    wrap.appendChild(imgWrap);
  }
  if (msg.files && msg.files.length > 0) {
    const fw = document.createElement('div'); fw.className = 'msg-files';
    msg.files.forEach(f => { const c = document.createElement('span'); c.className = 'msg-file-chip'; c.textContent = '📎 ' + f.name; fw.appendChild(c); });
    wrap.appendChild(fw);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (msg.text && msg.text.trim()) {
    try { bubble.innerHTML = marked.parse(msg.text); } catch(e) { bubble.textContent = msg.text; }
  }
  wrap.appendChild(bubble);

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = msg.time;
  wrap.appendChild(timeEl);

  row.appendChild(wrap);
  return row;
}

function renderAllMessages() {
  chatScroll.innerHTML = '';
  messages.forEach((msg, i) => chatScroll.appendChild(buildMsgRow(msg, i)));
  scrollToBottom();
}
function appendMessage(msg) {
  const row = buildMsgRow(msg, messages.length - 1);
  chatScroll.appendChild(row);
  scrollToBottom();
  return row;
}
function scrollToBottom() {
  requestAnimationFrame(() => { const p = document.getElementById('page-chat'); p.scrollTop = p.scrollHeight; });
}

const attachPreview   = document.getElementById('attachPreview');

function renderAttachPreview() {

      const reader = new FileReader();
      reader.onload = ev => { pendingAttachments.push({ type:'image', url:ev.target.result, name:file.name }); renderAttachPreview(); };
      reader.readAsDataURL(file);
    } else {
      pendingAttachments.push({ type:'file', name:file.name }); renderAttachPreview();
    }
  });
  fileInputHidden.value = '';

/* ============================================================
API 调用（流式 + 节流渲染 + 记忆注入 + 标记解析）
============================================================ */
async function callAPI() {
  const cfg = getConfig();
  if (!cfg.endpoint || !cfg.key || !cfg.model) { showToast('请先在 Space 页填写 API 配置'); return; }

  const apiMessages = messages.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text || '' }));
  if (memory.length > 0) {
    apiMessages.unshift({ role: 'system', content: '【长期记忆】\n' + memory.map(m => m.content).join('\n') });
  }

  const aiMsg = { role:'ai', text:'', images:[], files:[], time:timeStr() };
  messages.push(aiMsg); persistMessages();
  const aiRow = appendMessage(aiMsg);
  const aiBubble = aiRow.querySelector('.msg-bubble');

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  function renderPlain(text) { aiBubble.textContent = text; scrollToBottom(); }
  function renderFinal(text) {
    try { aiBubble.innerHTML = marked.parse(text); } catch(e) { aiBubble.textContent = text; }
    scrollToBottom();
  }

  try {
    const res = await fetch(cfg.endpoint + '/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + cfg.key },
      body: JSON.stringify({ model:cfg.model, stream:true, messages:apiMessages })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let accumulated = '';
    let lastRenderTime = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value, { stream:true }).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const delta = JSON.parse(data).choices?.[0]?.delta?.content || '';
          accumulated += delta;
          const now = Date.now();
          if (now - lastRenderTime > 80) {
            renderPlain(accumulated);
            lastRenderTime = now;
          }
        } catch(_) {}
      }
    }

    const cleanText = processMemoryMarkers(accumulated);
    messages[messages.length - 1].text = cleanText;
    persistMessages();
    renderFinal(cleanText);

  } catch(err) {
    console.error(err);
    messages.pop(); chatScroll.lastElementChild?.remove(); persistMessages();
    showToast('发送失败：' + err.message, 4000);
  } finally {
    sendBtn.disabled = false;
  }
}

发送
============================================================ */
const textInput = document.getElementById('textInput');
const sendBtn   = document.getElementById('sendBtn');

textInput.addEventListener('input', () => {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 100) + 'px';
});

async function sendMessage() {
  const text = textInput.value.trim();
  if (!text && pendingAttachments.length === 0) return;
  const images = pendingAttachments.filter(a => a.type==='image').map(a => a.url);
  const files  = pendingAttachments.filter(a => a.type==='file').map(a => ({ name:a.name }));
  const userMsg = { role:'user', text, images, files, time:timeStr() };
  messages.push(userMsg); persistMessages(); appendMessage(userMsg);
  textInput.value = ''; textInput.style.height = 'auto';
  pendingAttachments = []; renderAttachPreview();
  await callAPI();
}

sendBtn.addEventListener('click', sendMessage);
textInput.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
