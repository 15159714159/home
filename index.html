<script>
marked.setOptions({ breaks: true });

/* ============================================================
数据存储
============================================================ */
let messages = [];
let pendingAttachments = [];

const LS_MESSAGES = 'nest_messages';
const LS_CONFIG   = 'nest_config';

/* ============================================================
工具函数
============================================================ */
function timeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function calcDays() {
  const start = new Date('2026-07-01');
  const now   = new Date();
  return Math.max(Math.floor((now - start) / (1000*60*60*24)), 0);
}
document.getElementById('daysCount').textContent = '陪伴第 ' + calcDays() + ' 天';

/* ============================================================
Toast
============================================================ */
let toastTimer = null;
function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

/* ============================================================
API 配置
============================================================ */
function loadConfig() {
  const cfg = JSON.parse(localStorage.getItem(LS_CONFIG) || '{}');
  document.getElementById('cfgEndpoint').value = cfg.endpoint || '';
  document.getElementById('cfgKey').value      = cfg.key      || '';
  document.getElementById('cfgModel').value    = cfg.model    || '';
}

function saveConfig() {
  const cfg = {
    endpoint: document.getElementById('cfgEndpoint').value.trim().replace(/\/$/, ''),
    key:      document.getElementById('cfgKey').value.trim(),
    model:    document.getElementById('cfgModel').value.trim()
  };
  localStorage.setItem(LS_CONFIG, JSON.stringify(cfg));
  showToast('设置已保存 ✓');
}

function getConfig() {
  return JSON.parse(localStorage.getItem(LS_CONFIG) || '{}');
}

document.getElementById('cfgSaveBtn').addEventListener('click', saveConfig);

/* ============================================================
localStorage 持久化
============================================================ */
function persistMessages() {
  localStorage.setItem(LS_MESSAGES, JSON.stringify(messages));
}

function loadMessages() {
  try {
    const raw = localStorage.getItem(LS_MESSAGES);
    if (raw) messages = JSON.parse(raw);
  } catch(e) {
    messages = [];
  }
}

/* ============================================================
增量渲染
============================================================ */
const chatScroll = document.getElementById('chatScroll');

function buildMsgRow(msg, index) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + (msg.role === 'user' ? 'user' : 'ai');
  row.dataset.index = index;

  const wrap = document.createElement('div');
  wrap.className = 'msg-bubble-wrap';

  if (msg.images && msg.images.length > 0) {
    const imgWrap = document.createElement('div');
    imgWrap.className = 'msg-images';
    msg.images.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      imgWrap.appendChild(img);
    });
    wrap.appendChild(imgWrap);
  }

  if (msg.files && msg.files.length > 0) {
    const fileWrap = document.createElement('div');
    fileWrap.className = 'msg-files';
    msg.files.forEach(f => {
      const chip = document.createElement('span');
      chip.className = 'msg-file-chip';
      chip.textContent = '📎 ' + f.name;
      fileWrap.appendChild(chip);
    });
    wrap.appendChild(fileWrap);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (msg.text && msg.text.trim()) {
    try { bubble.innerHTML = marked.parse(msg.text); }
    catch(e) { bubble.textContent = msg.text; }
  }
  wrap.appendChild(bubble);

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = msg.time;
  wrap.appendChild(timeEl);

  row.appendChild(wrap);
  return row;
}

// 首次全量渲染
function renderAllMessages() {
  chatScroll.innerHTML = '';
  messages.forEach((msg, i) => chatScroll.appendChild(buildMsgRow(msg, i)));
  scrollToBottom();
}

// 追加单条
function appendMessage(msg) {
  const index = messages.length - 1;
  const row = buildMsgRow(msg, index);
  chatScroll.appendChild(row);
  scrollToBottom();
}

// 更新最后一条 ai 气泡（流式用）
function updateLastAIBubble(text) {
  const rows = chatScroll.querySelectorAll('.msg-row.ai');
  if (rows.length === 0) return;
  const lastRow = rows[rows.length - 1];
  const bubble = lastRow.querySelector('.msg-bubble');
  if (!bubble) return;
  try { bubble.innerHTML = marked.parse(text); }
  catch(e) { bubble.textContent = text; }
  scrollToBottom();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    const page = document.getElementById('page-chat');
    page.scrollTop = page.scrollHeight;
  });
}

/* ============================================================
顶部栏 - 胶囊标题可编辑
============================================================ */
const pageCapsule = document.getElementById('pageCapsule');
const pageTitles  = { chat: '然竣', diary: '日记', log: 'Log', space: 'Space' };

pageCapsule.addEventListener('click', () => {
  if (currentPage !== 'chat') return;
  pageCapsule.contentEditable = true;
  pageCapsule.focus();
  document.execCommand('selectAll', false, null);
});
pageCapsule.addEventListener('blur', () => {
  pageCapsule.contentEditable = false;
  pageTitles.chat = pageCapsule.textContent.trim() || '然竣';
  pageCapsule.textContent = pageTitles.chat;
});
pageCapsule.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); pageCapsule.blur(); }
});

/* ============================================================
侧边栏
============================================================ */
const sidebar        = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');

function openSidebar()  { sidebar.classList.add('show'); sidebarOverlay.classList.add('show'); }
function closeSidebar() { sidebar.classList.remove('show'); sidebarOverlay.classList.remove('show'); }

sidebarToggleBtn.addEventListener('click', openSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

let touchStartX = 0;
sidebar.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
sidebar.addEventListener('touchend',   e => {
  if (e.changedTouches[0].clientX - touchStartX < -60) closeSidebar();
});

document.querySelectorAll('.side-nav-item[data-nav]').forEach(item => {
  item.addEventListener('click', () => {
    if (item.dataset.nav === 'chat') {
      switchPage('chat');
      document.querySelectorAll('.side-nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
    }
    closeSidebar();
  });
});

/* ============================================================
页面切换
============================================================ */
let currentPage = 'chat';

function switchPage(pageName) {
  currentPage = pageName;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageName).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.nav-tab[data-page="${pageName}"]`).classList.add('active');
  pageCapsule.textContent = pageTitles[pageName];

  const isChat = pageName === 'chat';
  document.getElementById('avatarBtn').style.display   = isChat ? 'flex' : 'none';
  document.getElementById('inputBar').style.display    = isChat ? 'flex' : 'none';
  document.getElementById('attachPreview').style.display = isChat ? '' : 'none';
}

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchPage(tab.dataset.page));
});

/* ============================================================
附件预览
============================================================ */
const attachPreview = document.getElementById('attachPreview');

function renderAttachPreview() {
  attachPreview.innerHTML = '';
  pendingAttachments.forEach((att, idx) => {
    const thumb = document.createElement('div');
    thumb.className = 'attach-thumb';
    if (att.type === 'image') {
      const img = document.createElement('img'); img.src = att.url; thumb.appendChild(img);
    } else {
      thumb.classList.add('file-thumb'); thumb.textContent = att.name;
    }
    const removeBtn = document.createElement('button');
    removeBtn.className = 'attach-remove'; removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', () => { pendingAttachments.splice(idx, 1); renderAttachPreview(); });
    thumb.appendChild(removeBtn);
    attachPreview.appendChild(thumb);
  });
}

/* ============================================================
＋号附件
============================================================ */
const plusBtn       = document.getElementById('plusBtn');
const fileInputHidden = document.getElementById('fileInputHidden');

plusBtn.addEventListener('click', () => fileInputHidden.click());
fileInputHidden.addEventListener('change', e => {
  Array.from(e.target.files).forEach(file => {
    if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = ev => {
        pendingAttachments.push({ type: 'image', url: ev.target.result, name: file.name });
        renderAttachPreview();
      };
      reader.readAsDataURL(file);
    } else {
      pendingAttachments.push({ type: 'file', name: file.name });
      renderAttachPreview();
    }
  });
  fileInputHidden.value = '';
});

/* ============================================================
接入 API（流式）
============================================================ */
async function callAPI() {
  const cfg = getConfig();
  if (!cfg.endpoint || !cfg.key || !cfg.model) {
    showToast('请先在 Space 页填写 API 配置');
    return;
  }

  // 构建请求体
  const apiMessages = messages.map(m => ({
    role:    m.role === 'user' ? 'user' : 'assistant',
    content: m.text || ''
  }));

  // 占位 ai 消息
  const aiMsg = { role: 'ai', text: '', images: [], files: [], time: timeStr() };
  messages.push(aiMsg);
  persistMessages();
  appendMessage(aiMsg);

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;

  try {
    const res = await fetch(cfg.endpoint + '/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': 'Bearer ' + cfg.key
      },
      body: JSON.stringify({
        model:  cfg.model,
        stream: true,
        messages: apiMessages
      })
    });

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`HTTP ${res.status}: ${errText}`);
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let accumulated = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const json  = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || '';
          accumulated += delta;
          messages[messages.length - 1].text = accumulated;
          updateLastAIBubble(accumulated);
        } catch(_) {}
      }
    }

    messages[messages.length - 1].text = accumulated;
    persistMessages();

  } catch(err) {
    console.error(err);
    // 移除占位
    messages.pop();
    chatScroll.lastElementChild?.remove();
    persistMessages();
    showToast('发送失败：' + err.message, 4000);
  } finally {
    sendBtn.disabled = false;
  }
}

/* ============================================================
发送消息
============================================================ */
const textInput = document.getElementById('textInput');
const sendBtn   = document.getElementById('sendBtn');

textInput.addEventListener('input', () => {
  textInput.style.height = 'auto';
  textInput.style.height = Math.min(textInput.scrollHeight, 100) + 'px';
});

async function sendMessage() {
  const text = textInput.value.trim();
  if (!text && pendingAttachments.length === 0) return;

  const images = pendingAttachments.filter(a => a.type === 'image').map(a => a.url);
  const files  = pendingAttachments.filter(a => a.type === 'file').map(a => ({ name: a.name }));

  const userMsg = { role: 'user', text, images, files, time: timeStr() };
  messages.push(userMsg);
  persistMessages();
  appendMessage(userMsg);

  textInput.value = '';
  textInput.style.height = 'auto';
  pendingAttachments = [];
  renderAttachPreview();

  await callAPI();
}

sendBtn.addEventListener('click', sendMessage);
textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

loadMessages();
switchPage('chat');
renderAllMessages();
